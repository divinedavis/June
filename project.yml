name: June
options:
  bundleIdPrefix: com.divinedavis
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "CG89RY4W6R"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  June:
    type: application
    platform: iOS
    sources:
      - path: June
    entitlements:
      path: June/June.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.weatherkit: true
        aps-environment: production
        # iCloud / CloudKit deliberately omitted in v1 — bundle-id ↔ iCloud-container
        # linkage didn't persist on Apple's side and the public ASC API doesn't expose
        # it. CloudKitStore falls back to in-memory placeholders. Restore in v1.1.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.divinedavis.june
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIStatusBarStyle: "UIStatusBarStyleLightContent"
        INFOPLIST_KEY_UIUserInterfaceStyle: "Dark"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "June uses your location to center the map and find nearby places."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "June uses your photo library so you can pick a profile picture."
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "June"
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "14"
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
